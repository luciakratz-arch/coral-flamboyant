const EVENT_STATUS = [

  {key:"confirmado",label:"Confirmado",color:"#1B5E20"},
  {key:"cancelado",label:"Cancelado",color:"#B41020"},
  {key:"reagendado",label:"Reagendado",color:"#1565C0"},
  {key:"suspenso",label:"Suspenso",color:"#7B1FA2"},
  {key:"feriado",label:"Feriado",color:"#E65100"},
];
const EVENT_TYPES = ["Ensaio","Apresentação","Viagem","Reunião","Outro"];
const RECURRENCE = [{key:"none",label:"Evento único"},{key:"weekly",label:"Semanal"},{key:"biweekly",label:"Quinzenal"},{key:"monthly",label:"Mensal"}];
const MONTHS_PT = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const PRIORITY_COLORS = {urgente:"#B41020",importante:"#E65100",normal:"#1B5E20"};

function todayStr(){return new Date().toISOString().split("T")[0];}
function fmtDate(d){if(!d)return"";const[y,m,dd]=d.split("-");return`${parseInt(dd)} de ${MONTHS_PT[parseInt(m)-1]} de ${y}`;}
function fmtShort(d){if(!d)return"";const[,m,dd]=d.split("-");return`${parseInt(dd)}/${m}`;}

function useCollection(col){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    const unsub=db.collection(col).orderBy("createdAt","desc").onSnapshot(snap=>{
      setData(snap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    },()=>setLoading(false));
    return unsub;
  },[col]);
  return {data,loading};
}
async function addDoc(col,data){return db.collection(col).add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});}
async function updateDoc(col,id,data){return db.collection(col).doc(id).update({...data,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});}
async function delDoc(col,id){return db.collection(col).doc(id).delete();}

function Spinner(){return<div style={{display:"flex",justifyContent:"center",padding:40}}><div style={{width:28,height:28,border:"3px solid #7B1020",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>;}
function Empty({icon,msg}){return<div style={{textAlign:"center",padding:48,color:"#aaa"}}><div style={{fontSize:36,marginBottom:8}}>{icon}</div><div style={{fontSize:13}}>{msg}</div></div>;}
function Badge({color,label}){return<span className="badge" style={{background:color+"22",color}}>{label}</span>;}

function Modal({title,onClose,children,wide}){
  return<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal-box" style={{maxWidth:wide?700:520}}>
      <div className="modal-title">{title}<button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#aaa",lineHeight:1}}>×</button></div>
      {children}
    </div>
  </div>;
}

function FRow({label,children,half}){
  return<div style={{marginBottom:14,flex:half?"1":"unset"}}>
    <label className="label">{label}</label>
    {children}
  </div>;
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
function Login({members,onLogin}){
  const [mode,setMode]=useState("member");
  const [search,setSearch]=useState("");
  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState("");
  const filtered=members.filter(m=>m.active&&m.name&&m.name.toLowerCase().includes(search.toLowerCase()));

  return<div style={{minHeight:"100vh",background:"#7B1020",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{width:"100%",maxWidth:400}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:56,height:56,background:"rgba(255,255,255,0.15)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 12px"}}>🎵</div>
        <div style={{fontFamily:"'Playfair Display',serif",color:"#fff",fontSize:28,fontWeight:700}}>Coral Flamboyant</div>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:12,textTransform:"uppercase",letterSpacing:1.5,marginTop:4}}>Portal do Corista</div>
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:28,boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {["member","admin"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");}}
              style={{flex:1,padding:"9px",borderRadius:7,border:`1.5px solid ${mode===m?"#7B1020":"#E0E0E0"}`,background:mode===m?"#7B1020":"#fff",color:mode===m?"#fff":"#888",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
              {m==="member"?"Sou Corista":"Administrador"}
            </button>
          ))}
        </div>
        {mode==="member"?(<>
          <input className="input" placeholder="Digite seu nome..." value={search} onChange={e=>setSearch(e.target.value)} autoFocus style={{marginBottom:8}}/>
          <div style={{maxHeight:240,overflowY:"auto",border:"1px solid #eee",borderRadius:8}}>
            {filtered.length===0?<div style={{textAlign:"center",color:"#bbb",fontSize:13,padding:24}}>Nenhum membro encontrado</div>:
            filtered.map(m=>(
              <button key={m.id} onClick={()=>{const u={id:m.id,name:m.name,voice:m.voice,isAdmin:false};localStorage.setItem("cf_user",JSON.stringify(u));onLogin(u);}}
                style={{width:"100%",textAlign:"left",padding:"11px 14px",border:"none",borderBottom:"1px solid #f5f5f5",background:"#fff",cursor:"pointer",fontFamily:"inherit",transition:"background 0.1s"}}
                onMouseOver={e=>e.currentTarget.style.background="#fafafa"} onMouseOut={e=>e.currentTarget.style.background="#fff"}>
                <div style={{fontWeight:600,fontSize:13,color:"#1A1A2E"}}>{m.name}</div>
                <div style={{fontSize:11,color:VOICE_COLORS[m.voice]||"#888",marginTop:1}}>{VOICE_LABELS[m.voice]||m.voice}</div>
              </button>
            ))}
          </div>
        </>):(<>
          <input type="password" className="input" placeholder="Senha do administrador" value={pwd} onChange={e=>{setPwd(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&(pwd===ADMIN_PASSWORD?(()=>{const u={id:"admin",name:"Administrador",isAdmin:true};localStorage.setItem("cf_user",JSON.stringify(u));onLogin(u);})():setErr("Senha incorreta"))} autoFocus/>
          {err&&<div style={{color:"#c00",fontSize:12,marginTop:6}}>{err}</div>}
          <button className="btn-red" style={{width:"100%",marginTop:14}} onClick={()=>pwd===ADMIN_PASSWORD?(()=>{const u={id:"admin",name:"Administrador",isAdmin:true};localStorage.setItem("cf_user",JSON.stringify(u));onLogin(u);})():setErr("Senha incorreta")}>Entrar</button>
        </>)}
      </div>
    </div>
  </div>;
}

// ── PAINEL ─────────────────────────────────────────────────────────────────
function Painel(){
  const {data:members}=useCollection("members");
  const {data:events}=useCollection("events");
  const {data:songs}=useCollection("songs");
  const {data:avisos}=useCollection("avisos");
  const today=todayStr();
  const ativos=members.filter(m=>m.active);
  const prox=events.filter(e=>e.date>=today).sort((a,b)=>a.date>b.date?1:-1).slice(0,4);
  const cm=new Date().getMonth()+1;
  const bdayS=members.filter(m=>m.active&&m.birthday&&parseInt(m.birthday.split("-")[1])===cm);

  return<div>
    <div className="page-title">Painel</div>
    <div className="page-sub">Visão geral do Coral Flamboyant</div>
    <div className="grid-4">
      {[["👥","Integrantes",ativos.length,"ativos"],["🎵","Músicas",songs.length,"no repertório"],["📅","Eventos",events.length,"cadastrados"],["🎂","Aniversários",bdayS.length,"este mês"]].map(([icon,label,val,sub])=>(
        <div key={label} className="stat-card">
          <div style={{fontSize:24,marginBottom:4}}>{icon}</div>
          <div className="stat-val">{val}</div>
          <div className="stat-label">{sub}</div>
          <div style={{fontSize:12,color:"#888",marginTop:2}}>{label}</div>
        </div>
      ))}
    </div>
    <div className="grid-2">
      <div>
        <div style={{fontSize:14,fontWeight:700,color:"#1A1A2E",marginBottom:12}}>Próximos eventos</div>
        {prox.length===0?<Empty icon="📅" msg="Nenhum evento próximo"/>:prox.map(e=>{
          const st=EVENT_STATUS.find(s=>s.key===e.status)||EVENT_STATUS[0];
          return<div key={e.id} className="card" style={{padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontWeight:600,fontSize:14,color:"#1A1A2E"}}>{e.title}</div>
                <div style={{fontSize:12,color:"#888",marginTop:2}}>{fmtDate(e.date)}{e.timeChegada&&` · ${e.timeChegada}`}</div>
                {e.location&&<div style={{fontSize:12,color:"#888"}}>📍 {e.location}</div>}
              </div>
              <Badge color={st.color} label={st.label}/>

        <div style={{fontSize:14,fontWeight:700,color:"#1A1A2E",marginBottom:12}}>Avisos recentes</div>
        {avisos.slice(0,3).map(a=>(
          <div key={a.id} className="card" style={{padding:14,borderLeft:`3px solid ${PRIORITY_COLORS[a.priority]||"#888"}`}}>
            <Badge color={PRIORITY_COLORS[a.priority]||"#888"} label={a.priority||"normal"}/>
            <div style={{fontSize:13,color:"#333",marginTop:6,lineHeight:1.5}}>{a.text}</div>
          </div>
        ))}
        {bdayS.length>0&&<><div style={{fontSize:14,fontWeight:700,color:"#1A1A2E",marginBottom:12,marginTop:16}}>🎂 Aniversariantes</div>
        {bdayS.map(m=><div key={m.id} className="card" style={{padding:12,fontSize:13,color:"#333"}}>{m.name} — {m.birthday?.split("-").slice(1).reverse().join("/")}</div>)}</>}
      </div>
    </div>
  </div>;
}

// ── AGENDA ─────────────────────────────────────────────────────────────────
function Agenda({user}){
  const {data:events,loading}=useCollection("events");
  const [month,setMonth]=useState(new Date().getMonth());
  const [year,setYear]=useState(new Date().getFullYear());
  const [showForm,setShowForm]=useState(false);
  const [editing,setEditing]=useState(null);
  const blank={title:"Ensaio",type:"Ensaio",date:todayStr(),dateEnd:"",timeChegada:"",timeApresentacao:"",location:"",mapsUrl:"",vestuario:"",description:"",status:"planejado",recurrence:"none"};
  const [form,setForm]=useState(blank);

  const monthEvents=events.filter(e=>{if(!e.date)return false;const[y,m]=e.date.split("-");return parseInt(m)-1===month&&parseInt(y)===year;}).sort((a,b)=>a.date>b.date?1:-1);

  function openEdit(ev){setEditing(ev.id);setForm({title:ev.title||"Ensaio",type:ev.type||"Ensaio",date:ev.date||todayStr(),dateEnd:ev.dateEnd||"",timeChegada:ev.timeChegada||"",timeApresentacao:ev.timeApresentacao||"",location:ev.location||"",mapsUrl:ev.mapsUrl||"",vestuario:ev.vestuario||"",description:ev.description||"",status:ev.status||"planejado",recurrence:ev.recurrence||"none"});setShowForm(true);}

  async function save(){
    if(!form.title||!form.date)return;
    if(editing){await updateDoc("events",editing,form);}
    else{
      if(form.recurrence!=="none"){
        const dates=[];
        const d=new Date(form.date+"T12:00:00");
        const end=new Date();end.setFullYear(end.getFullYear()+1);
        while(d<=end&&dates.length<52){
          dates.push(d.toISOString().split("T")[0]);
          if(form.recurrence==="weekly")d.setDate(d.getDate()+7);
          else if(form.recurrence==="biweekly")d.setDate(d.getDate()+14);
          else if(form.recurrence==="monthly")d.setMonth(d.getMonth()+1);
        }
        const groupId="group_"+Date.now();
        for(const dt of dates)await addDoc("events",{...form,date:dt,recurrenceGroupId:groupId});
      } else await addDoc("events",form);
    }
    setShowForm(false);setEditing(null);setForm(blank);
  }

  async function del(ev){
    if(ev.recurrenceGroupId){
      const choice=confirm("Excluir só este evento?\n\nOK = só este\nCancelar = este e os próximos");
      if(choice){await delDoc("events",ev.id);}
      else{
        const snap=await db.collection("events").where("recurrenceGroupId","==",ev.recurrenceGroupId).where("date",">=",ev.date).get();
        for(const d of snap.docs)await d.ref.delete();
      }
    } else {if(confirm("Excluir evento?"))await delDoc("events",ev.id);}
  }

  const prevMonth=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const nextMonth=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};

  const F=(k,t="text",opts)=><div style={{marginBottom:14}}>
    <label className="label">{k}</label>
    {opts?<select className="input" value={form[t]} onChange={e=>setForm(f=>({...f,[t]:e.target.value}))}>{opts.map(o=><option key={o.key||o} value={o.key||o}>{o.label||o}</option>)}</select>
    :<input className="input" type={t==="text"?"text":t} value={form[t]} onChange={e=>setForm(f=>({...f,[t]:e.target.value}))}/>}
  </div>;

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
      <div><div className="page-title">Agenda</div><div className="page-sub">Ensaios, apresentações e eventos</div></div>
      {user.isAdmin&&<button className="btn-red" onClick={()=>{setEditing(null);setForm(blank);setShowForm(true);}}>+ Novo Evento</button>}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
      <button onClick={prevMonth} style={{background:"#fff",border:"1px solid #E0E0E0",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:16,color:"#666"}}>‹</button>
      <div style={{flex:1,textAlign:"center",fontWeight:700,fontSize:16,color:"#1A1A2E"}}>{MONTHS_PT[month]} {year}</div>
      <button onClick={nextMonth} style={{background:"#fff",border:"1px solid #E0E0E0",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:16,color:"#666"}}>›</button>
    </div>
    {loading?<Spinner/>:monthEvents.length===0?<Empty icon="📅" msg="Nenhum evento neste mês"/>:monthEvents.map(ev=>{
      const st=EVENT_STATUS.find(s=>s.key===ev.status)||{color:"#888",label:ev.status};
      return<div key={ev.id} className="card fade-in" style={{borderLeft:`4px solid ${st.color}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <Badge color={st.color} label={st.label}/>
              {ev.type&&ev.type!=="Ensaio"&&<Badge color="#555" label={ev.type}/>}
            </div>
            <div style={{fontWeight:700,fontSize:15,color:"#1A1A2E",marginBottom:4}}>{ev.title}</div>
            <div style={{fontSize:13,color:"#888",marginBottom:4}}>{fmtDate(ev.date)}{ev.dateEnd&&ev.dateEnd!==ev.date&&` até ${fmtDate(ev.dateEnd)}`}</div>
            {ev.timeChegada&&<div style={{fontSize:13,color:"#666"}}>🕐 Chegada: <strong>{ev.timeChegada}</strong>{ev.timeApresentacao&&` · Apresentação: ${ev.timeApresentacao}`}</div>}
            {ev.location&&<div style={{fontSize:13,color:"#666",marginTop:2}}>📍 {ev.location}{ev.mapsUrl&&<a href={ev.mapsUrl} target="_blank" style={{color:"#7B1020",marginLeft:8,fontSize:12,fontWeight:600}}>Ver no Maps →</a>}</div>}
            {ev.vestuario&&<div style={{fontSize:13,color:"#666",marginTop:2}}>👗 {ev.vestuario}</div>}
            {ev.description&&<div style={{fontSize:13,color:"#666",marginTop:4,fontStyle:"italic"}}>{ev.description}</div>}
          </div>
          {user.isAdmin&&<div style={{display:"flex",gap:6,marginLeft:12}}>
            <button className="btn-sm" onClick={()=>openEdit(ev)}>✎ Editar</button>
            <button className="btn-sm-red" onClick={()=>del(ev)}>✕</button>
          </div>}
        </div>
      </div>;
    })}
    {showForm&&<Modal title={editing?"Editar Evento":"Novo Evento"} onClose={()=>{setShowForm(false);setEditing(null);}}>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}>{F("Tipo de evento","type",EVENT_TYPES.map(t=>({key:t,label:t})))}</div>
        <div style={{flex:2}}>{F("Título","title")}</div>
      </div>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}>{F("Data de início","date","date")}</div>
        <div style={{flex:1}}>{F("Data de término","dateEnd","date")}</div>
      </div>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}>{F("Horário de chegada","timeChegada","time")}</div>
        <div style={{flex:1}}>{F("Horário de apresentação","timeApresentacao","time")}</div>
      </div>
      {F("Local","location")}
      {F("Link Google Maps","mapsUrl")}
      {F("Vestuário","vestuario")}
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}>{F("Status","status",EVENT_STATUS)}</div>
        {!editing&&<div style={{flex:1}}>{F("Recorrência","recurrence",RECURRENCE)}</div>}
      </div>
      <div style={{marginBottom:14}}>
        <label className="label">Observações</label>
        <textarea className="input" style={{minHeight:80,resize:"vertical"}} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/>
      </div>
      <div style={{display:"flex",gap:10}}>

        <button className="btn-red" style={{flex:2}} onClick={save}>Salvar</button>
      </div>
    </Modal>}
  </div>;
}

      {user.isAdmin&&<button className="btn-red" onClick={()=>{setEditing(null);setForm({text:"",priority:"normal"});setShowForm(true);}}>+ Aviso</button>}
    </div>
    {loading?<Spinner/>:avisos.length===0?<Empty icon="📢" msg="Nenhum aviso"/>:avisos.map(a=>(
      <div key={a.id} className="card fade-in" style={{borderLeft:`4px solid ${PRIORITY_COLORS[a.priority]||"#888"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}><Badge color={PRIORITY_COLORS[a.priority]||"#888"} label={a.priority||"normal"}/><div style={{fontSize:14,color:"#333",marginTop:8,lineHeight:1.6}} dangerouslySetInnerHTML={{__html:a.text}}/></div>
          {user.isAdmin&&<div style={{display:"flex",gap:6,marginLeft:12}}>
            <button className="btn-sm" onClick={()=>{setEditing(a.id);setForm({text:a.text||"",priority:a.priority||"normal"});setShowForm(true);}}>✎</button>
            <button className="btn-sm-red" onClick={()=>del(a.id)}>✕</button>
          </div>}
        </div>
      </div>
    ))}
    {showForm&&<Modal title={editing?"Editar Aviso":"Novo Aviso"} onClose={()=>{setShowForm(false);setEditing(null);}}>
      <div style={{marginBottom:14}}><label className="label">Prioridade</label><select className="input" value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))}><option value="normal">Normal</option><option value="importante">Importante</option><option value="urgente">Urgente</option></select></div>
      <div style={{marginBottom:16}}>
        <label className="label">Mensagem</label>
        <div style={{display:"flex",gap:4,marginBottom:6}}>{[["N","bold"],["I","italic"],["S","underline"]].map(([l,c])=><button key={c} onMouseDown={e=>{e.preventDefault();fmt(c);}} style={{padding:"3px 10px",border:"1px solid #ddd",borderRadius:4,cursor:"pointer",fontWeight:l==="N"?"700":"normal",fontStyle:l==="I"?"italic":"normal",textDecoration:l==="S"?"underline":"none",background:"#fff",fontSize:13}}>{l}</button>)}</div>
        <div ref={textRef} contentEditable suppressContentEditableWarning onInput={()=>setForm(f=>({...f,text:textRef.current.innerHTML}))} style={{minHeight:120,border:"1px solid #E0E0E0",borderRadius:7,padding:"9px 12px",fontSize:13,outline:"none",lineHeight:1.7}} dangerouslySetInnerHTML={{__html:form.text}}/>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>{setShowForm(false);setEditing(null);}} style={{flex:1,padding:"10px",borderRadius:7,border:"1px solid #E0E0E0",background:"#f5f5f5",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13}}>Cancelar</button>
        <button className="btn-red" style={{flex:2}} onClick={save}>Salvar</button>
      </div>
    </Modal>}
  </div>;
}

// ── INTEGRANTES ────────────────────────────────────────────────────────────
function Integrantes(){
  const {data:members,loading}=useCollection("members");
  const [filter,setFilter]=useState("ativos");
  const [showForm,setShowForm]=useState(false);
  const [editing,setEditing]=useState(null);
  const blank={name:"",voice:"soprano",birthday:"",whatsapp:"",email:"",active:true,startDate:todayStr(),endDate:"",notes:""};
  const [form,setForm]=useState(blank);
  const filtered=members.filter(m=>filter==="todos"?true:filter==="ativos"?m.active:!m.active);

  function openEdit(m){setEditing(m.id);setForm({name:m.name||"",voice:m.voice||"soprano",birthday:m.birthday||"",whatsapp:m.whatsapp||"",email:m.email||"",active:m.active!==false,startDate:m.startDate||todayStr(),endDate:m.endDate||"",notes:m.notes||""});setShowForm(true);}
  async function save(){if(!form.name)return;if(editing)await updateDoc("members",editing,form);else await addDoc("members",form);setShowForm(false);setEditing(null);}
  async function del(id){if(confirm("Excluir integrante?"))await delDoc("members",id);}

  const byVoice=Object.entries(VOICE_LABELS).map(([k,v])=>({key:k,label:v,members:filtered.filter(m=>m.voice===k)})).filter(g=>g.members.length>0);

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
      <div><div className="page-title">Integrantes</div><div className="page-sub">{members.filter(m=>m.active).length} ativos · {members.length} total</div></div>
      <button className="btn-red" onClick={()=>{setEditing(null);setForm(blank);setShowForm(true);}}>+ Integrante</button>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:20}}>
      {["ativos","inativos","todos"].map(f=>(
        <button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 14px",borderRadius:20,border:`1.5px solid ${filter===f?"#7B1020":"#E0E0E0"}`,background:filter===f?"#7B102022":"#fff",color:filter===f?"#7B1020":"#888",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textTransform:"capitalize"}}>{f}</button>
      ))}
    </div>
    {loading?<Spinner/>:byVoice.length===0?<Empty icon="👥" msg="Nenhum integrante"/>:byVoice.map(g=>(
      <div key={g.key} style={{marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:700,color:VOICE_COLORS[g.key],textTransform:"uppercase",letterSpacing:1,marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
          <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:VOICE_COLORS[g.key]}}/>
          {g.label} ({g.members.length})
        </div>
        {g.members.map(m=>(
          <div key={m.id} className="card fade-in" style={{padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:"#1A1A2E"}}>{m.name}</div>
                <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                  <Badge color={VOICE_COLORS[m.voice]||"#888"} label={VOICE_LABELS[m.voice]||m.voice}/>
                  <Badge color={m.active?"#1B5E20":"#888"} label={m.active?"Ativo":"Inativo"}/>
                  {m.birthday&&<span style={{fontSize:12,color:"#888"}}>🎂 {fmtShort(m.birthday)}</span>}
                  {m.whatsapp&&<span style={{fontSize:12,color:"#888"}}>📱 {m.whatsapp}</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button className="btn-sm" onClick={()=>openEdit(m)}>✎</button>
                <button className="btn-sm-red" onClick={()=>del(m.id)}>✕</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    ))}
    {showForm&&<Modal title={editing?"Editar Integrante":"Novo Integrante"} onClose={()=>{setShowForm(false);setEditing(null);}}>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:2}}><label className="label">Nome completo</label><input className="input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
        <div style={{flex:1}}><label className="label">Naipe</label><select className="input" value={form.voice} onChange={e=>setForm(f=>({...f,voice:e.target.value}))}>{Object.entries(VOICE_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div>
      </div>
      <div style={{display:"flex",gap:12,marginTop:14}}>
        <div style={{flex:1}}><label className="label">Nascimento</label><input type="date" className="input" value={form.birthday} onChange={e=>setForm(f=>({...f,birthday:e.target.value}))}/></div>
        <div style={{flex:1}}><label className="label">Ingresso</label><input type="date" className="input" value={form.startDate} onChange={e=>setForm(f=>({...f,startDate:e.target.value}))}/></div>
        <div style={{flex:1}}><label className="label">Saída</label><input type="date" className="input" value={form.endDate} onChange={e=>setForm(f=>({...f,endDate:e.target.value}))}/></div>
      </div>
      <div style={{display:"flex",gap:12,marginTop:14}}>
        <div style={{flex:1}}><label className="label">WhatsApp</label><input className="input" value={form.whatsapp} onChange={e=>setForm(f=>({...f,whatsapp:e.target.value}))}/></div>
        <div style={{flex:1}}><label className="label">E-mail</label><input className="input" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div>
        <div style={{flex:1}}><label className="label">Status</label><select className="input" value={form.active?"ativo":"inativo"} onChange={e=>setForm(f=>({...f,active:e.target.value==="ativo"}))}><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select></div>
      </div>
      <div style={{marginTop:14,marginBottom:16}}><label className="label">Observações</label><textarea className="input" style={{minHeight:60,resize:"vertical"}} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>{setShowForm(false);setEditing(null);}} style={{flex:1,padding:"10px",borderRadius:7,border:"1px solid #E0E0E0",background:"#f5f5f5",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13}}>Cancelar</button>
        <button className="btn-red" style={{flex:2}} onClick={save}>Salvar</button>
      </div>
    </Modal>}
  </div>;
}

// ── PERFIL DO CORISTA ──────────────────────────────────────────────────────
function Perfil({user}){
  const {data:members}=useCollection("members");
  const member=members.find(m=>m.id===user.id);
  if(!member)return<Empty icon="👤" msg="Perfil não encontrado"/>;
  return<div>
    <div className="page-title">Meu Perfil</div>
    <div className="page-sub">Suas informações no coral</div>
    <div className="card" style={{maxWidth:480}}>
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:VOICE_COLORS[member.voice]||"#7B1020",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:22,fontWeight:700}}>{member.name?.[0]}</div>
        <div>
          <div style={{fontWeight:700,fontSize:18,color:"#1A1A2E"}}>{member.name}</div>
          <Badge color={VOICE_COLORS[member.voice]||"#888"} label={VOICE_LABELS[member.voice]||member.voice}/>
        </div>
      </div>
      {[["🎂 Nascimento",fmtDate(member.birthday)],["📱 WhatsApp",member.whatsapp],["✉️ E-mail",member.email],["📅 Ingresso",fmtDate(member.startDate)],["📝 Observações",member.notes]].map(([l,v])=>v?<div key={l} style={{marginBottom:12,paddingBottom:12,borderBottom:"1px solid #f0f0f0"}}>
        <div style={{fontSize:11,color:"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,marginBottom:2}}>{l}</div>
        <div style={{fontSize:14,color:"#333"}}>{v}</div>
      </div>:null)}
    </div>
  </div>;
}

// ── PLACEHOLDER PAGES ──────────────────────────────────────────────────────
function ComingSoon({title,icon}){
  return<div>
    <div className="page-title">{title}</div>
    <div style={{textAlign:"center",padding:60,color:"#aaa"}}>
      <div style={{fontSize:48,marginBottom:12}}>{icon}</div>
      <div style={{fontSize:15,fontWeight:600,color:"#888",marginBottom:4}}>Em desenvolvimento</div>
      <div style={{fontSize:13}}>Esta funcionalidade será adicionada em breve.</div>
    </div>
  </div>;
}

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("painel");
  const {data:members,loading:lm}=useCollection("members");

  useEffect(()=>{
    const s=localStorage.getItem("cf_user");
    if(s){try{const u=JSON.parse(s);setUser(u);setTab(u.isAdmin?"painel":"agenda");}catch{}}
    setLoading(false);
  },[]);

  if(loading||lm)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:12,color:"#aaa"}}>
    <div style={{width:36,height:36,border:"3px solid #7B1020",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    <div style={{fontSize:14}}>Carregando...</div>
  </div>;

  if(!user)return<Login members={members} onLogin={u=>{setUser(u);setTab(u.isAdmin?"painel":"agenda");}}/>;

  const pages = {
    painel: <Painel/>,
    agenda: <Agenda user={user}/>,
    repertorio: <Repertorio user={user}/>,
    estudos: <SalaEstudos user={user}/>,
    avisos: <Avisos user={user}/>,
    integrantes: <Integrantes/>,
    frequencia: <ComingSoon title="Frequência" icon="✅"/>,
    relatorios: <ComingSoon title="Relatórios" icon="📈"/>,
    declaracao: <ComingSoon title="Declaração Digital" icon="📋"/>,
    apresentacao: <ComingSoon title="Apresentação" icon="🎤"/>,
    perfil: <Perfil user={user}/>,
  };

  return<div style={{display:"flex",minHeight:"100vh"}}>
    <Sidebar user={user} tab={tab} setTab={setTab}/>
    <div className="main-content">
      {pages[tab]||<Empty icon="🔍" msg="Página não encontrada"/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
