<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONSTANTES ──────────────────────────────────────────────────────────────
const ADMIN_PASSWORD = "1234";
const C = { vermelho:"#B41020", verde:"#1B5E20", branco:"#FFFFFF", fundo:"#FAFAFA", borda:"#E8E0E0", texto:"#1A1A1A", textoSub:"#666666", textoLeve:"#999999" };
const VOICE_LABELS = { soprano:"Soprano", contralto:"Contralto", alto:"Alto", tenor:"Tenor", baixo:"Baixo" };
const VOICE_COLORS = { soprano:"#B41020", contralto:"#7B1FA2", alto:"#E65100", tenor:"#1565C0", baixo:"#1B5E20" };
const FILE_FIELDS = [
  { key:"original", label:"Música Original", icon:"♩", type:"audio" },
  { key:"playback", label:"Playback", icon:"♪", type:"audio" },
  { key:"partitura", label:"Partitura", icon:"𝄞", type:"doc" },
  { key:"soprano", label:"Soprano", icon:"●", type:"audio" },
  { key:"contralto", label:"Contralto", icon:"●", type:"audio" },
  { key:"alto", label:"Alto", icon:"●", type:"audio" },
  { key:"tenor", label:"Tenor", icon:"●", type:"audio" },
  { key:"baixo", label:"Baixo", icon:"●", type:"audio" },
];
const STUDY_CATEGORIES = [
  { key:"tecnica", label:"Técnica Vocal", color:"#B41020" },
  { key:"teoria", label:"Teoria Musical", color:"#1565C0" },
  { key:"aquecimento", label:"Aquecimento", color:"#E65100" },
  { key:"videos", label:"Vídeos de Referência", color:"#6A1B9A" },
  { key:"outros", label:"Outros", color:"#1B5E20" },
];
const EVENT_STATUS = [
  { key:"normal", label:"Normal", color:"#1B5E20", icon:"●" },
  { key:"cancelado", label:"Cancelado", color:"#B41020", icon:"✕" },
  { key:"feriado", label:"Feriado / Recesso", color:"#E65100", icon:"✦" },
  { key:"reagendado", label:"Reagendado", color:"#1565C0", icon:"↗" },
  { key:"suspenso", label:"Suspenso", color:"#7B1FA2", icon:"⏸" },
];
const RECURRENCE_OPTIONS = [
  { key:"none", label:"Evento único" },
  { key:"weekly", label:"Semanal" },
  { key:"biweekly", label:"Quinzenal" },
  { key:"monthly", label:"Mensal" },
];
const WEEKDAYS = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const MONTHS_PT = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const MONTHS_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ── ESTILOS ──────────────────────────────────────────────────────────────────
const LS = { display:"block", fontSize:10, color:C.textoSub, fontWeight:700, marginBottom:5, textTransform:"uppercase", letterSpacing:1.2 };
const IS = { width:"100%", padding:"10px 12px", borderRadius:6, border:`1px solid ${C.borda}`, fontSize:13, outline:"none", background:C.branco, color:C.texto, fontFamily:"inherit" };
const BTN = (bg,color="#fff") => ({ background:bg, color, border:"none", borderRadius:6, padding:"11px 18px", fontSize:13, fontWeight:700, cursor:"pointer", width:"100%", fontFamily:"inherit" });
const BTN_SM = (c) => ({ background:"transparent", color:c, border:`1px solid ${c}`, borderRadius:4, padding:"3px 8px", fontSize:11, cursor:"pointer", fontFamily:"inherit", fontWeight:600 });
const CARD = { background:C.branco, borderRadius:8, border:`1px solid ${C.borda}`, padding:16, marginBottom:12, boxShadow:"0 1px 4px rgba(0,0,0,0.04)" };

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmtDate(d) { if (!d) return ""; const [y,m,dd] = d.split("-"); return `${parseInt(dd)} de ${MONTHS_PT[parseInt(m)-1]} de ${y}`; }
function fmtDateShort(d) { if (!d) return ""; const [,m,dd] = d.split("-"); return `${parseInt(dd)}/${m}`; }
function todayStr() { return new Date().toISOString().split("T")[0]; }
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }

// ── FIREBASE HOOKS ────────────────────────────────────────────────────────────
function useCollection(col) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    const unsub = db.collection(col).orderBy("createdAt","desc").onSnapshot(snap => {
      setData(snap.docs.map(d => ({ id:d.id, ...d.data() })));
      setLoading(false);
    }, () => setLoading(false));
    return unsub;
  }, [col]);
  return { data, loading };
}

async function addDoc(col, data) {
  return db.collection(col).add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
}
async function updateDoc(col, id, data) {
  return db.collection(col).doc(id).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
}
async function deleteDoc(col, id) {
  return db.collection(col).doc(id).delete();
}

// ── COMPONENTES BASE ──────────────────────────────────────────────────────────
function Spinner() {
  return <div style={{display:"flex",justifyContent:"center",padding:40}}>
    <div style={{width:32,height:32,border:"3px solid #B41020",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
  </div>;
}

function Modal({ title, onClose, children }) {
  return <div className="modal-overlay" onClick={e => e.target===e.currentTarget&&onClose()}>
    <div className="modal-box">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:16,color:C.texto}}>{title}</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.textoSub}}>×</button>
      </div>
      {children}
    </div>
  </div>;
}

function Badge({ color, children }) {
  return <span style={{background:color+"22",color,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700}}>{children}</span>;
}

function EmptyState({ icon, msg }) {
  return <div style={{textAlign:"center",padding:40,color:C.textoLeve}}>
    <div style={{fontSize:32,marginBottom:8}}>{icon}</div>
    <div style={{fontSize:13}}>{msg}</div>
  </div>;
}

// ── LOGIN ──────────────────────────────────────────────────────────────────────
function Login({ members, onLogin }) {
  const [mode, setMode] = useState("member"); // "member" | "admin"
  const [search, setSearch] = useState("");
  const [pwd, setPwd] = useState("");
  const [err, setErr] = useState("");

  const filtered = members.filter(m => m.active && m.name.toLowerCase().includes(search.toLowerCase()));

  function selectMember(m) {
    localStorage.setItem("cf_user", JSON.stringify({ id:m.id, name:m.name, voice:m.voice, isAdmin:false }));
    onLogin({ id:m.id, name:m.name, voice:m.voice, isAdmin:false });
  }

  function loginAdmin() {
    if (pwd === ADMIN_PASSWORD) {
      const u = { id:"admin", name:"Administrador", isAdmin:true };
      localStorage.setItem("cf_user", JSON.stringify(u));
      onLogin(u);
    } else setErr("Senha incorreta");
  }

  return <div style={{minHeight:"100vh",background:C.vermelho,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{fontFamily:"'Playfair Display',serif",color:"#fff",fontSize:28,fontWeight:700,marginBottom:4}}>Coral Flamboyant</div>
    <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,marginBottom:24,textTransform:"uppercase",letterSpacing:1.5}}>Portal do Corista</div>
    <div style={{background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:360,boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {["member","admin"].map(m => (
          <button key={m} onClick={() => { setMode(m); setErr(""); }}
            style={{flex:1,padding:"8px",borderRadius:6,border:`1px solid ${mode===m?C.vermelho:C.borda}`,background:mode===m?C.vermelho:"#fff",color:mode===m?"#fff":C.textoSub,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
            {m==="member" ? "Sou Corista" : "Admin"}
          </button>
        ))}
      </div>
      {mode === "member" ? (<>
        <input style={IS} placeholder="Buscar seu nome..." value={search} onChange={e=>setSearch(e.target.value)} autoFocus/>
        <div style={{maxHeight:220,overflowY:"auto",marginTop:8}}>
          {filtered.length === 0 && <div style={{textAlign:"center",color:C.textoLeve,fontSize:13,padding:20}}>Nenhum membro encontrado</div>}
          {filtered.map(m => (
            <button key={m.id} onClick={() => selectMember(m)}
              style={{width:"100%",textAlign:"left",padding:"10px 12px",border:"none",borderBottom:`1px solid ${C.borda}`,background:"none",cursor:"pointer",fontFamily:"inherit"}}>
              <div style={{fontWeight:700,fontSize:13,color:C.texto}}>{m.name}</div>
              <div style={{fontSize:11,color:VOICE_COLORS[m.voice]||C.textoSub}}>{VOICE_LABELS[m.voice]||m.voice}</div>
            </button>
          ))}
        </div>
      </>) : (<>
        <input type="password" style={IS} placeholder="Senha do admin" value={pwd} onChange={e=>{setPwd(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&loginAdmin()} autoFocus/>
        {err && <div style={{color:C.vermelho,fontSize:12,marginTop:6}}>{err}</div>}
        <button onClick={loginAdmin} style={{...BTN(C.vermelho),marginTop:12}}>Entrar</button>
      </>)}
    </div>
  </div>;
}

// ── AGENDA ─────────────────────────────────────────────────────────────────────
function Agenda({ user }) {
  const { data: events, loading } = useCollection("events");
  const [month, setMonth] = useState(new Date().getMonth());
  const [year, setYear] = useState(new Date().getFullYear());
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ title:"Ensaio", date:todayStr(), timeChegada:"", timeApresentacao:"", location:"", vestuario:"", description:"", status:"normal", statusNote:"", recurrence:"none" });

  const monthEvents = events.filter(e => {
    if (!e.date) return false;
    const [y,m] = e.date.split("-");
    return parseInt(m)-1===month && parseInt(y)===year;
  }).sort((a,b) => a.date > b.date ? 1 : -1);

  function openEdit(ev) {
    setEditing(ev.id);
    setForm({ title:ev.title||"", date:ev.date||"", timeChegada:ev.timeChegada||"", timeApresentacao:ev.timeApresentacao||"", location:ev.location||"", vestuario:ev.vestuario||"", description:ev.description||"", status:ev.status||"normal", statusNote:ev.statusNote||"", recurrence:ev.recurrence||"none" });
    setShowForm(true);
  }

  async function save() {
    if (!form.title || !form.date) return;
    if (editing) await updateDoc("events", editing, form);
    else await addDoc("events", form);
    setShowForm(false); setEditing(null);
    setForm({ title:"Ensaio", date:todayStr(), timeChegada:"", timeApresentacao:"", location:"", vestuario:"", description:"", status:"normal", statusNote:"", recurrence:"none" });
  }

  async function del(id) { if (confirm("Excluir evento?")) await deleteDoc("events", id); }

  const prevMonth = () => { if (month===0) { setMonth(11); setYear(y=>y-1); } else setMonth(m=>m-1); };
  const nextMonth = () => { if (month===11) { setMonth(0); setYear(y=>y+1); } else setMonth(m=>m+1); };

  return <div style={{padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.texto}}>Agenda</div>
      {user.isAdmin && <button onClick={()=>{setEditing(null);setShowForm(true);}} style={{background:C.vermelho,color:"#fff",border:"none",borderRadius:6,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Evento</button>}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
      <button onClick={prevMonth} style={{background:"none",border:`1px solid ${C.borda}`,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:14}}>‹</button>
      <div style={{flex:1,textAlign:"center",fontWeight:700,fontSize:15,color:C.texto}}>{MONTHS_PT[month]} {year}</div>
      <button onClick={nextMonth} style={{background:"none",border:`1px solid ${C.borda}`,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:14}}>›</button>
    </div>
    {loading ? <Spinner/> : monthEvents.length===0 ? <EmptyState icon="📅" msg="Nenhum evento neste mês"/> : monthEvents.map(ev => {
      const st = EVENT_STATUS.find(s=>s.key===ev.status)||EVENT_STATUS[0];
      return <div key={ev.id} style={CARD} className="fade-in">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{color:st.color,fontSize:12}}>{st.icon}</span>
              <div style={{fontWeight:700,fontSize:14,color:C.texto}}>{ev.title}</div>
            </div>
            <div style={{fontSize:12,color:C.textoSub,marginBottom:4}}>{fmtDate(ev.date)}</div>
            {ev.timeChegada && <div style={{fontSize:12,color:C.textoSub}}>🕐 Chegada: {ev.timeChegada}{ev.timeApresentacao&&` · Apresentação: ${ev.timeApresentacao}`}</div>}
            {ev.location && <div style={{fontSize:12,color:C.textoSub,marginTop:2}}>📍 {ev.location}</div>}
            {ev.vestuario && <div style={{fontSize:12,color:C.textoSub,marginTop:2}}>👗 {ev.vestuario}</div>}
            {ev.description && <div style={{fontSize:12,color:C.textoSub,marginTop:4,fontStyle:"italic"}}>{ev.description}</div>}
          </div>
          {user.isAdmin && <div style={{display:"flex",gap:6,marginLeft:8}}>
            <button onClick={()=>openEdit(ev)} style={BTN_SM(C.textoSub)}>✎</button>
            <button onClick={()=>del(ev.id)} style={BTN_SM(C.vermelho)}>✕</button>
          </div>}
        </div>
      </div>;
    })}
    {showForm && <Modal title={editing?"Editar Evento":"Novo Evento"} onClose={()=>{setShowForm(false);setEditing(null);}}>
      {[["Título","title","text"],["Data","date","date"],["Horário de chegada","timeChegada","time"],["Horário de apresentação","timeApresentacao","time"],["Local","location","text"],["Vestuário","vestuario","text"]].map(([l,k,t]) => (
        <div key={k} style={{marginBottom:12}}>
          <label style={LS}>{l}</label>
          <input style={IS} type={t} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}/>
        </div>
      ))}
      <div style={{marginBottom:12}}>
        <label style={LS}>Status</label>
        <select style={IS} value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
          {EVENT_STATUS.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
        </select>
      </div>
      <div style={{marginBottom:12}}>
        <label style={LS}>Recorrência</label>
        <select style={IS} value={form.recurrence} onChange={e=>setForm(f=>({...f,recurrence:e.target.value}))}>
          {RECURRENCE_OPTIONS.map(r=><option key={r.key} value={r.key}>{r.label}</option>)}
        </select>
      </div>
      <div style={{marginBottom:16}}>
        <label style={LS}>Observações</label>
        <textarea style={{...IS,minHeight:80,resize:"vertical"}} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{setShowForm(false);setEditing(null);}} style={{...BTN("#f0f0f0",C.texto),flex:1}}>Cancelar</button>
        <button onClick={save} style={{...BTN(C.vermelho),flex:1}}>Salvar</button>
      </div>
    </Modal>}
  </div>;
}

// ── REPERTÓRIO ─────────────────────────────────────────────────────────────────
function Repertorio({ user }) {
  const { data: songs, loading } = useCollection("songs");
  const [selected, setSelected] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ title:"", composer:"", categoria:"MPB", curiosidades:"", letra:"", files:{} });
  const [editing, setEditing] = useState(null);
  const [search, setSearch] = useState("");

  const filtered = songs.filter(s => s.title&&s.title.toLowerCase().includes(search.toLowerCase()));

  function openEdit(s) {
    setEditing(s.id);
    setForm({ title:s.title||"", composer:s.composer||"", categoria:s.categoria||"MPB", curiosidades:s.curiosidades||"", letra:s.letra||"", files:s.files||{} });
    setShowForm(true);
  }

  async function save() {
    if (!form.title) return;
    if (editing) await updateDoc("songs", editing, form);
    else await addDoc("songs", form);
    setShowForm(false); setEditing(null);
  }

  async function del(id) { if (confirm("Excluir música?")) { await deleteDoc("songs", id); if (selected?.id===id) setSelected(null); } }

  if (selected) {
    const s = songs.find(x=>x.id===selected.id) || selected;
    return <div style={{padding:16}}>
      <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:C.vermelho,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:16}}>← Voltar</button>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.texto,marginBottom:4}}>{s.title}</div>
      {s.composer && <div style={{fontSize:13,color:C.textoSub,marginBottom:16}}>Compositor: {s.composer}</div>}
      {s.curiosidades && <div style={{...CARD,background:"#FFF8F8"}}>
        <div style={{fontSize:11,fontWeight:700,color:C.vermelho,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Curiosidades</div>
        <div style={{fontSize:13,color:C.texto,lineHeight:1.6}}>{s.curiosidades}</div>
      </div>}
      <div style={{fontSize:13,fontWeight:700,color:C.texto,marginBottom:8}}>Arquivos de ensaio</div>
      {FILE_FIELDS.map(f => {
        const url = s.files?.[f.key];
        return <div key={f.key} style={{...CARD,padding:12}}>
          <div style={{fontSize:11,color:C.textoSub,fontWeight:700,marginBottom:6,textTransform:"uppercase"}}>{f.icon} {f.label}</div>
          {url ? (f.type==="audio" ? <audio controls src={url} style={{width:"100%"}}/> : <a href={url} target="_blank" style={{color:C.vermelho,fontSize:13}}>Abrir arquivo</a>) : <div style={{fontSize:12,color:C.textoLeve}}>Não disponível</div>}
        </div>;
      })}
      {s.letra && <><div style={{fontSize:13,fontWeight:700,color:C.texto,marginBottom:8,marginTop:8}}>Letra</div>
      <div style={{...CARD,whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.8,color:C.texto}}>{s.letra}</div></>}
    </div>;
  }

  return <div style={{padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.texto}}>Repertório</div>
      {user.isAdmin && <button onClick={()=>{setEditing(null);setForm({title:"",composer:"",categoria:"MPB",curiosidades:"",letra:"",files:{}});setShowForm(true);}} style={{background:C.vermelho,color:"#fff",border:"none",borderRadius:6,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Música</button>}
    </div>
    <input style={{...IS,marginBottom:16}} placeholder="Buscar música..." value={search} onChange={e=>setSearch(e.target.value)}/>
    {loading ? <Spinner/> : filtered.length===0 ? <EmptyState icon="🎵" msg="Nenhuma música cadastrada"/> : filtered.map(s => (
      <div key={s.id} style={{...CARD,cursor:"pointer"}} onClick={()=>setSelected(s)} className="fade-in">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>

// ── SALA DE ESTUDOS ────────────────────────────────────────────────────────────
function SalaEstudos({ user }) {

  const [cat, setCat] = useState("todos");

  const [editing, setEditing] = useState(null);

  const filtered = cat==="todos" ? materials : materials.filter(m=>m.category===cat);

  async function save() {
    if (!form.title) return;
    if (editing) await updateDoc("materials", editing, form);

        <button key={c.key} onClick={()=>setCat(c.key)}

      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{setShowForm(false);setEditing(null);}} style={{...BTN("#f0f0f0",C.texto),flex:1}}>Cancelar</button>

}

// ── PAINEL ADMIN ────────────────────────────────────────────────────────────────
function Painel({ user }) {
  const { data: members } = useCollection("members");
  const { data: events } = useCollection("events");
  const { data: songs } = useCollection("songs");
  const { data: avisos } = useCollection("avisos");

  const today = todayStr();
  const ativos = members.filter(m=>m.active);
  const proxEventos = events.filter(e=>e.date>=today).sort((a,b)=>a.date>b.date?1:-1).slice(0,3);
  const currentMonth = new Date().getMonth()+1;
  const aniversarios = members.filter(m=>m.active&&m.birthday&&parseInt(m.birthday.split("-")[1])===currentMonth);

  return <div style={{padding:16}}>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:C.texto,marginBottom:20}}>Painel</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
      {[["👥","Integrantes",ativos.length,"ativos"],["🎵","Músicas",songs.length,"no repertório"],["📅","Eventos",events.length,"cadastrados"],["🎂","Aniversários",aniversarios.length,"este mês"]].map(([icon,label,val,sub])=>(
        <div key={label} style={{...CARD,textAlign:"center",padding:16}}>
          <div style={{fontSize:24,marginBottom:4}}>{icon}</div>
          <div style={{fontSize:24,fontWeight:700,color:C.vermelho}}>{val}</div>
          <div style={{fontSize:11,color:C.textoSub,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8}}>{sub}</div>
        </div>
      ))}
    </div>
    {aniversarios.length>0 && <div style={{...CARD,background:"#FFF8F8",marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:700,color:C.vermelho,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>🎂 Aniversariantes do mês</div>
      {aniversarios.map(m=><div key={m.id} style={{fontSize:13,color:C.texto,marginBottom:4}}>{m.name} — {m.birthday?.split("-").slice(1).reverse().join("/")}</div>)}
    </div>}
    <div style={{fontSize:13,fontWeight:700,color:C.texto,marginBottom:8}}>Próximos eventos</div>
    {proxEventos.length===0 ? <EmptyState icon="📅" msg="Nenhum evento próximo"/> : proxEventos.map(e=>(
      <div key={e.id} style={{...CARD,padding:12}}>
        <div style={{fontWeight:700,fontSize:13,color:C.texto}}>{e.title}</div>
        <div style={{fontSize:12,color:C.textoSub}}>{fmtDate(e.date)}{e.timeChegada&&` · ${e.timeChegada}`}</div>
      </div>
    ))}
    {avisos.length>0 && <><div style={{fontSize:13,fontWeight:700,color:C.texto,marginBottom:8,marginTop:8}}>Avisos recentes</div>
    {avisos.slice(0,2).map(a=>(
      <div key={a.id} style={{...CARD,padding:12,borderLeft:`3px solid #B41020`}}>
        <div style={{fontSize:13,color:C.texto}}>{a.text}</div>
      </div>
    ))}</>}
  </div>;
}

// ── APP PRINCIPAL ──────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState(0);
  const { data: members, loading: loadingMembers } = useCollection("members");

  useEffect(() => {
    const saved = localStorage.getItem("cf_user");
    if (saved) { try { setUser(JSON.parse(saved)); } catch {} }
    setLoading(false);
  }, []);

  if (loading || loadingMembers) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:12,color:C.textoSub}}>
    <div style={{width:40,height:40,border:`3px solid ${C.vermelho}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    <div style={{fontFamily:"sans-serif",fontSize:14}}>Carregando...</div>
  </div>;

  if (!user) return <Login members={members} onLogin={setUser}/>;

  const isAdmin = user.isAdmin;
  const tabs = isAdmin
    ? [{label:"Painel",icon:"📊"},{label:"Agenda",icon:"📅"},{label:"Músicas",icon:"🎵"},{label:"Estudos",icon:"📚"},{label:"Avisos",icon:"📢"},{label:"Equipe",icon:"👥"}]
    : [{label:"Agenda",icon:"📅"},{label:"Músicas",icon:"🎵"},{label:"Estudos",icon:"📚"},{label:"Avisos",icon:"📢"}];

  const pages = isAdmin
    ? [<Painel user={user}/>, <Agenda user={user}/>, <Repertorio user={user}/>, <SalaEstudos user={user}/>, <Avisos user={user}/>, <Integrantes user={user}/>]
    : [<Agenda user={user}/>, <Repertorio user={user}/>, <SalaEstudos user={user}/>, <Avisos user={user}/>];

  return <div style={{minHeight:"100vh",background:C.fundo,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",boxShadow:"0 0 20px rgba(0,0,0,0.08)"}}>
    <div style={{background:C.vermelho,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100}}>
      <div>
        <div style={{fontFamily:"'Playfair Display',serif",color:"#fff",fontSize:17,fontWeight:700}}>Coral Flamboyant</div>
        <div style={{color:"rgba(255,255,255,0.7)",fontSize:10,textTransform:"uppercase",letterSpacing:1}}>Olá, {user.name.split(" ")[0]}{isAdmin?" · Admin":""}</div>
      </div>
      <button onClick={()=>{localStorage.removeItem("cf_user");setUser(null);setTab(0);}} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.4)",color:"#fff",borderRadius:4,padding:"5px 10px",fontSize:10,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:0.8}}>Sair</button>
    </div>
    <div style={{flex:1,overflowY:"auto",paddingBottom:80}}>
      {pages[tab]}
    </div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:`1px solid ${C.borda}`,display:"flex",zIndex:100}}>
      {tabs.map((t,i)=>(
        <button key={i} className="tab-btn" onClick={()=>setTab(i)} style={{color:tab===i?C.vermelho:C.textoLeve,borderTop:`2px solid ${tab===i?C.vermelho:"transparent"}`}}>
          <span style={{fontSize:18}}>{t.icon}</span>
          {t.label}
        </button>
      ))}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
